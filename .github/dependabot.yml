version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      langchain:
        patterns: ["langchain*", "langgraph*"]
      retrieval:
        patterns: ["chromadb", "sentence-transformers", "bm25*", "rank-bm25"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
