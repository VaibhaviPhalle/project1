name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday scan

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: |
            uv.lock
            pyproject.toml
      - name: Set up Python
        run: uv python install 3.11
      - name: Install runtime + dev
        run: uv pip install --system -e ".[dev]"
      - name: pip-audit
        # `--strict` is intentionally omitted: it makes the "editable install
        # skipped" notice fatal even when no vulns are found.
        run: pip-audit --skip-editable
