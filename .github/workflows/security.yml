name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"  # weekly Monday scan

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.x"
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.11
      - name: Install runtime + dev
        run: uv pip install --system -e ".[dev]"
      - name: pip-audit
        run: pip-audit --strict --skip-editable
